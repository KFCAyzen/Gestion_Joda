<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Joda — Portail étudiant · mobile</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="pm.css">
<style>
  html, body { margin: 0; padding: 0; background: #0c0205; font-family: 'Inter', sans-serif; }
  @keyframes pm-dot { 0%, 60%, 100% { opacity: .3; transform: translateY(0); } 30% { opacity: 1; transform: translateY(-2px); } }
</style>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>

<div id="root"></div>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="pm-shell.jsx"></script>
<script type="text/babel" src="pm-screens-a.jsx"></script>
<script type="text/babel" src="pm-screens-b.jsx"></script>

<script type="text/babel">
const App = () => (
  <DesignCanvas>
    <DCSection
      id="portail-mobile"
      title="Portail étudiant · mobile"
      subtitle="Direction premium : verre dépoli sur dégradé crimson-aubergine, anneaux de progression façon Apple Fitness, motif avion en papier (étudier à l'étranger). L'étudiant ne voit jamais l'admin — juste sa progression, son agent, et ce qu'il doit faire ensuite."
    >
      <DCArtboard id="m-home" label="Accueil — anneau dossier + prochaine action" width={390} height={844}>
        <ScreenHome />
      </DCArtboard>
      <DCArtboard id="m-parcours" label="Parcours — voyage Bamako → Pékin" width={390} height={844}>
        <ScreenParcours />
      </DCArtboard>
      <DCArtboard id="m-docs" label="Documents — 5/7, upload guidé" width={390} height={844}>
        <ScreenDocs />
      </DCArtboard>
      <DCArtboard id="m-pay" label="Paiements — solde + échéancier" width={390} height={844}>
        <ScreenPay />
      </DCArtboard>
      <DCArtboard id="m-chat" label="Messagerie — chat avec l'agent" width={390} height={844}>
        <ScreenChat />
      </DCArtboard>
    </DCSection>
  </DesignCanvas>
);
ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
