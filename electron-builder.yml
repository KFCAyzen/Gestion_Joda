appId: com.jodacompany.desktop
productName: Joda Company
copyright: Copyright © 2026 Joda Company

# Phase 2 : `better-sqlite3` est une dépendance native. electron-builder utilise
# @electron/rebuild pour la recompiler contre la bonne version d'Electron.
# Nécessite Visual Studio Build Tools (cf. https://www.electron.build/tutorials/code-signing).
npmRebuild: true

# Le code source compilé d'Electron + les ressources embarquées.
directories:
  output: release
  buildResources: electron/icons

# Fichiers inclus dans l'app (resources/app.asar).
# On inclut UNIQUEMENT better-sqlite3 et drizzle-orm (dépendances du main process).
# Le standalone Next.js a son propre node_modules en extraResources.
files:
  - "dist-electron/**/*"
  - "package.json"
  - "node_modules/better-sqlite3/**/*"
  - "node_modules/bindings/**/*"
  - "node_modules/file-uri-to-path/**/*"
  - "node_modules/drizzle-orm/**/*"
  - "!**/{.DS_Store,.git,.gitignore,.gitattributes,test,tests,examples,docs,scripts}"
  - "!**/{appveyor.yml,.travis.yml,circle.yml,*.md}"
  - "!**/{npm-debug.log,yarn.lock,.yarn-integrity,*.tsbuildinfo,*.d.ts.map,*.js.map}"
  - "!**/*.{iml,o,hprof,orig,pyc,pyo,rbc,swp,c,cpp,h,gyp}"

# Mode asar avec better-sqlite3 unpacké (les .node natifs ne peuvent pas être dans l'asar).
asar: true
asarUnpack:
  - "node_modules/better-sqlite3/**/*"
  - "node_modules/bindings/**/*"

# Le build Next.js standalone est trop volumineux pour `files`, on le déclare en `extraResources`.
# Il sera disponible dans `process.resourcesPath` à l'exécution.
extraResources:
  - from: ".next/standalone"
    to: "app/.next/standalone"
    filter: ["**/*"]
  - from: ".next/static"
    to: "app/.next/standalone/.next/static"
    filter: ["**/*"]
  - from: "public"
    to: "app/.next/standalone/public"
    filter: ["**/*"]

# Plate-forme Windows.
win:
  target:
    - target: nsis
      arch:
        - x64
  icon: electron/icons/icon.ico
  artifactName: "${productName}-Setup-${version}.${ext}"

# Installeur NSIS.
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: always
  createStartMenuShortcut: true
  shortcutName: Joda Company
  installerIcon: electron/icons/icon.ico
  uninstallerIcon: electron/icons/icon.ico
  installerHeader: electron/icons/icon.ico
  license: LICENSE.txt
  warningsAsErrors: false

# Pas de publication auto (pas d'auto-update pour l'instant).
publish: null
