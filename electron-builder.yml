appId: com.jodacompany.desktop
productName: Joda Company
copyright: Copyright © 2026 Joda Company

# Hook qui copie le build Next.js standalone (avec son node_modules) dans
# resources/app après packaging — electron-builder exclut node_modules des
# extraResources, ce hook contourne le problème.
afterPack: scripts/after-pack.cjs

# Phase 2 : `better-sqlite3` est une dépendance native. electron-builder utilise
# @electron/rebuild pour la recompiler contre la bonne version d'Electron.
# Désactivé ici car le rebuild auto échoue sur @parcel/watcher (transitive de
# Next.js, pas utilisé en runtime). On gère le rebuild de better-sqlite3
# manuellement via `npm run electron:rebuild-native` (cf. package.json).
npmRebuild: false

# Le code source compilé d'Electron + les ressources embarquées.
directories:
  output: release
  buildResources: electron/icons

# Fichiers inclus dans l'app (resources/app.asar).
# On inclut UNIQUEMENT better-sqlite3 et drizzle-orm (dépendances du main process).
# Le standalone Next.js a son propre node_modules en extraResources.
files:
  - "dist-electron/**/*"
  - "package.json"
  - "node_modules/better-sqlite3/**/*"
  - "node_modules/bindings/**/*"
  - "node_modules/file-uri-to-path/**/*"
  - "node_modules/drizzle-orm/**/*"
  - "!**/{.DS_Store,.git,.gitignore,.gitattributes,.gitmodules}"
  - "!**/{appveyor.yml,.travis.yml,circle.yml,*.md}"
  - "!**/{npm-debug.log,yarn.lock,.yarn-integrity,*.tsbuildinfo,*.d.ts.map,*.js.map}"
  - "!**/*.{iml,o,hprof,orig,pyc,pyo,rbc,swp,c,cpp,h,gyp}"

# asar avec better-sqlite3 unpacké (les .node natifs ne peuvent pas être lus
# depuis un asar). Mettre asar:false si besoin de débugger le contenu packagé.
asar: true
asarUnpack:
  - "node_modules/better-sqlite3/**/*"
  - "node_modules/bindings/**/*"

# Le build Next.js standalone (avec son node_modules) est copié par le hook
# afterPack (scripts/after-pack.cjs), car electron-builder exclut node_modules
# des extraResources. Voir le hook pour les détails.

# Plate-forme Windows.
win:
  target:
    - target: nsis
      arch:
        - x64
  icon: electron/icons/icon.ico
  artifactName: "${productName}-Setup-${version}.${ext}"

# Installeur NSIS.
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: always
  createStartMenuShortcut: true
  shortcutName: Joda Company
  installerIcon: electron/icons/icon.ico
  uninstallerIcon: electron/icons/icon.ico
  installerHeader: electron/icons/icon.ico
  license: LICENSE.txt
  warningsAsErrors: false

# Pas de publication auto (pas d'auto-update pour l'instant).
publish: null
